name: Merge all Dependabot PRs

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Approve and merge all Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          prs=$(gh pr list --repo "$REPO" --author 'app/dependabot' --json number --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No Dependabot PRs found"
            exit 0
          fi
          for pr in $prs; do
            echo "Processing PR #$pr"
            gh pr review --approve "$pr" --repo "$REPO"
            gh pr merge --auto --squash "$pr" --repo "$REPO"
          done
