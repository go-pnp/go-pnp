name: Auto-release updated modules

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Dependabot commit
        id: check
        run: |
          message=$(git log -1 --pretty=%s)
          if echo "$message" | grep -q '^Bump .* from .* to '; then
            echo "is_dependabot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dependabot=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changed modules and create tags
        if: steps.check.outputs.is_dependabot == 'true'
        run: |
          changed_files=$(git diff --name-only HEAD~1 HEAD)

          modules=$(echo "$changed_files" | grep 'go\.mod$' | sed 's|/go\.mod$||' | grep -v '^go\.mod$' || true)

          if [ -z "$modules" ]; then
            echo "No module go.mod files changed"
            exit 0
          fi

          for module in $modules; do
            latest_tag=$(git tag --list "${module}/v*" --sort=-v:refname | head -1)

            if [ -z "$latest_tag" ]; then
              echo "No existing tag for ${module}, skipping"
              continue
            fi

            version=${latest_tag##*/v}
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)

            new_tag="${module}/v${major}.${minor}.$((patch + 1))"

            echo "Tagging ${new_tag}"
            git tag "$new_tag"
            git push origin "$new_tag"
          done
